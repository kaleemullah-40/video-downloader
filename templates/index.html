<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook & Instagram HD Video Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .options-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        select {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: white;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        .loading {
            display: none;
            margin-top: 15px;
            color: #764ba2;
            font-weight: bold;
        }
        .ad-slot {
            width: 100%;
            max-width: 728px;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- TOP ADS SLOT (320x50 Optimized for Mobile Devices) -->
<div style="margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center;">
    <script type="text/javascript">
      atOptions = {
        'key' : '856229b7cf3a8a0763762fd672697a84',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script type="text/javascript" src="https://highperformanceformat.com"></script>
</div>

<div class="container">
    <h2>FB & Insta Downloader</h2>
    <p>Download Facebook Videos & Instagram Reels instantly</p>
    
    <form id="downloadForm">
        <input type="text" id="videoUrl" name="url" placeholder="Paste Facebook or Instagram link here..." required>
        
        <div class="options-group">
            <select name="type" id="downloadType">
                <option value="video">Video (MP4)</option>
                <option value="audio">Audio (MP3)</option>
            </select>
            
            <select name="quality" id="videoQuality">
                <option value="best">Best Quality</option>
            </select>
        </div>
        
        <button type="submit" id="submitBtn">Start Download</button>
    </form>
    
    <div class="loading" id="loadingText">⏳ Fetching video link... Please wait.</div>
</div>

<!-- BOTTOM ADS SLOT (728x90 Banner for Desktop users) -->
<div class="ad-slot">
    <script type="text/javascript">
        atOptions = {
            'key' : '6de0dbcfdb8ab93ba582ef9c4de433e1',
            'format' : 'iframe',
            'height' : 90,
            'width' : 728,
            'params' : {}
        };
    </script>
    <script type="text/javascript" src="https://highperformanceformat.com"></script>
</div>

<script>
    document.getElementById('downloadForm').onsubmit = async function(e) {
        e.preventDefault(); // Prevents layout flashing and default form behavior
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingText = document.getElementById('loadingText');
        
        submitBtn.disabled = true;
        loadingText.style.display = 'block';
        loadingText.innerText = "⏳ Processing safe cloud streams... Please wait.";

        const formData = new FormData();
        formData.append('url', document.getElementById('videoUrl').value);
        formData.append('type', document.getElementById('downloadType').value);

        try {
            const response = await fetch('/download', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                loadingText.innerText = "📥 Connection secured! Initializing download chunk stream...";
                // Triggers structural data streaming via in-memory secure backend handler
                window.location.href = data.stream_url;
            } else {
                alert("Error: " + data.error);
            }
        } catch (err) {
            alert("Network handshake timed out. Platform token expired. Please try again.");
        } finally {
            submitBtn.disabled = false;
            setTimeout(() => { loadingText.style.display = 'none'; }, 6000);
        }
    };
</script>

<!-- AUTO ADS INJECTION (Popunder, Direct Links and Native Smart Overlays) -->
<script src="https://effectivecpmnetwork.com"></script>

</body>
</html>
