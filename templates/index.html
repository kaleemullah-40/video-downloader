<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook & Instagram HD Video Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .options-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        select {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: white;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        .loading {
            display: none;
            margin-top: 15px;
            color: #764ba2;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FB & Insta Downloader</h2>
    <p>Download Facebook Videos & Instagram Reels instantly</p>
    
    <form id="downloadForm">
        <input type="text" id="videoUrl" name="url" placeholder="Paste Facebook or Instagram link here..." required>
        
        <div class="options-group">
            <select name="type" id="downloadType" onchange="toggleQuality()">
                <option value="video">Video (MP4)</option>
                <option value="audio">Audio (MP3)</option>
            </select>
            
            <select name="quality" id="videoQuality">
                <option value="best">Best Quality</option>
            </select>
        </div>
        
        <button type="submit" id="submitBtn">Start Download</button>
    </form>
    
    <div class="loading" id="loadingText">⏳ Fetching video link... Please wait.</div>
    <div id="downloadArea" style="margin-top: 20px; display: none;">
        <p style="color: green; font-weight: bold;">Link Found Successfully!</p>
        <a id="realDownloadLink" rel="noreferrer" style="display: inline-block; background: #28a745; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold;">👉 Click Here to Save Video</a>
        <p style="font-size: 11px; color: #888; margin-top: 10px;">Note: If video plays instead of downloading, tap the 3 dots (⋮) on video player and click Download.</p>
    </div>
</div>

<script>
    function toggleQuality() {
        const type = document.getElementById('downloadType').value;
        const qualitySelect = document.getElementById('videoQuality');
        qualitySelect.style.display = (type === 'audio') ? 'none' : 'block';
    }

    document.getElementById('downloadForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingText = document.getElementById('loadingText');
        const downloadArea = document.getElementById('downloadArea');
        const realDownloadLink = document.getElementById('realDownloadLink');
        
        submitBtn.disabled = true;
        loadingText.style.display = 'block';
        downloadArea.style.display = 'none';

        const formData = new FormData();
        formData.append('url', document.getElementById('videoUrl').value);
        formData.append('type', document.getElementById('downloadType').value);

        try {
            const response = await fetch('/download', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                loadingText.style.display = 'none';
                downloadArea.style.display = 'block';
                
                // Set the real uncorrupted direct link to button
                realDownloadLink.href = data.download_url;
                realDownloadLink.setAttribute('download', data.filename);
            } else {
                alert("Error: " + data.error);
                loadingText.style.display = 'none';
            }
        } catch (err) {
            alert("Connection Error. Please check your link or try again.");
            loadingText.style.display = 'none';
        } finally {
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
